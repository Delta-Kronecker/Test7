name: Config Collector

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-configs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install telethon requests
        
    - name: Run config collector
      env:
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python proxy_collector.py
        
    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Action'
        git config --global user.email 'action@github.com'
        
        # اضافه کردن همه فایل‌های متنی (کانفیگ‌ها و DNS)
        git add netmod_configs.txt slipnet_configs.txt dns_ips.txt proxy_collector.py
        
        # اگر تغییری وجود داشت، کامیت و push کن
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Update configs and DNS [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi
